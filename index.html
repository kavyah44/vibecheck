  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['"Fredoka"', 'sans-serif'],
            body: ['"Inter"', 'sans-serif'],
          },
        },
      },

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet"
  />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; }

    .vibe-transition { transition: all 0.55s cubic-bezier(0.4, 0, 0.2, 1); }

    .bounce-in { animation: bounceIn 0.45s cubic-bezier(0.34, 1.56, 0.64, 1); }
    @keyframes bounceIn {
      0%   { transform: scale(0.8); opacity: 0.4; }
      60%  { transform: scale(1.1); }
      100% { transform: scale(1);   opacity: 1; }
    }

    @keyframes float {
      0%,  100% { transform: translateY(0px)   rotate(-1deg); }
      35%        { transform: translateY(-16px) rotate(2deg);  }
      70%        { transform: translateY(-9px)  rotate(-2deg); }
    }
    .float-anim { animation: float 3.6s ease-in-out infinite; }

    @keyframes pulse-ring {
      0%   { transform: scale(0.9);  opacity: 0.8; }
      100% { transform: scale(1.55); opacity: 0;   }
    }
    .pulse-ring { animation: pulse-ring 2.3s ease-out infinite; }

    .input-glow:focus {
      box-shadow: 0 0 0 4px rgba(255,255,255,0.22), 0 0 28px rgba(255,255,255,0.12);
    }

    /* Mascot — soft shadow only, no hard border */
    .mascot-pop {
      filter:
        drop-shadow(0 8px 28px rgba(0,0,0,0.18))
        drop-shadow(0 2px 8px rgba(0,0,0,0.10));
    }

    @keyframes wiggle {
      0%, 100% { transform: rotate(0deg); }
      25%  { transform: rotate(-6deg); }
      75%  { transform: rotate(6deg);  }
    }
    .wiggle { animation: wiggle 0.4s ease-in-out; }

    @keyframes slideUp {
      from { opacity: 0; transform: translate(-50%, 20px) scale(0.96); }
      to   { opacity: 1; transform: translate(-50%, 0px)  scale(1);    }
    }
    .slide-up { animation: slideUp 0.38s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }

    @keyframes fadeInScale {
      from { opacity: 0; transform: scale(0.94); }
      to   { opacity: 1; transform: scale(1);    }
    }
    .fade-in-scale { animation: fadeInScale 0.3s ease-out forwards; }
  </style>
</head>

    /* ─────────────────────────────────────────────
       VIBE-TO-SONG MAP
       Each mood maps to a song title + artist.
       ↓ Paste an MP3 URL or a direct audio URL into

       YouTube watch links don't work as audio src —
       use a direct .mp3 / .ogg / .wav URL instead.
    ───────────────────────────────────────────── */
    const VIBE_SONGS = {
      happy:     { title: "Don't Stop Me Now",  artist: "Queen",               url: '' /* ← paste MP3/audio URL here */ },

    /* ─────────────────────────────────────────────
       MOOD DETECTION DATABASE
       Covers: Gen Z slang, emotional vocabulary,
       current 2024–25 expressions, mental health
       language, internet-speak, and standard words
    ───────────────────────────────────────────── */
    function getMood(raw) {
      const t = raw.toLowerCase().trim();
      const has = words => words.some(w => t.includes(w));

      if (has([
        'happy','joy','joyful','excited','excite','great','awesome','yay','yass',
        'slay','slaying','ate','eating','bussin','lit','fire','goated','based',
        'thriving','glowing','glow up','blessed','winning','popping','iconic',
        'understood the assignment','main character','W moment','phenomenal',
        'fantastic','elated','overjoyed','ecstatic','delighted','cheerful',
        'radiant','flourishing','euphoric','on top of the world','cloud nine',
        'over the moon','living my best','best day','so good','feels amazing',
        'cant stop smiling','love this','loving life','nailed it','crushed it',
        'poppin off','going off','so hype','so hyped','so pumped','incredible',
        'unreal how good','good vibes only','vibing hard','in my element',
      ])) return 'happy';

      if (has([
        'sad','down','blue','cry','upset','depressed','depression','big sad',
        'in my feels','not okay','broken','empty','hollow','miserable',
        'heartbroken','devastated','feeling low','fell apart','it hurts',
        'gutted','wrecked','crushed','torn apart','nothing feels right',
        'feel like crying','want to cry','lost it','sobbing','tearing up',
        'bawling','ngl hurt','grief','mourning','aching','in pain','hurting',
        'struggling','can\'t cope','falling apart','breaking down','shattered',
        'feel nothing','emotional wreck','cant stop crying','low point',
        'worst day','hate everything','dont want to exist','disappear',
        'give up','no point','what\'s the point','whats the point',
      ])) return 'sad';

      if (has([
        'angry','anger','mad','furious','fury','rage','rageful','annoyed',
        'frustrated','frustrating','pressed','heated','salty','pissed',
        'livid','seething','triggered','done with','over it','can\'t stand',
        'irate','fuming','boiling','snapping','losing it','can\'t take it',
        'fed up','had enough','losing my mind','infuriated','outraged',
        'enraged','steaming','worked up','blew up','flipped out','lost it',
        'going off','seeing red','blood boiling','absolutely done',
        'screw this','f this','hate them','so annoying','makes me sick',
        'unbearable','insufferable','at my limit','on my last nerve',
      ])) return 'angry';

      if (has([
        'chill','calm','calm down','calming','relax','relaxed','relaxing',
        'zen','peace','peaceful','peaced out','cool','unbothered','soft life',
        'cozy','cozy day','healing','healing era','grounded','at peace',
        'lowkey','mellow','tranquil','serene','laid back','easygoing',
        'no worries','all good','cottagecore','touch grass','taking it slow',
        'quiet','mindful','balanced','settled','still','nothing matters rn',
        'just breathing','vibing softly','ease','not stressed','stress free',
        'went for a walk','had tea','nap','napping','slow morning','gentle',
        'content','simple day','at ease','in the moment','present',
      ])) return 'chill';

      if (has([
        'love','loved','loving','heart','crush','crushin','romance','romantic',
        'adore','adoring','down bad','caught feelings','simp','simping',
        'obsessed','crushing','falling','smitten','infatuated','head over heels',
        'lovesick','lovestruck','butterflies','can\'t stop thinking about',
        'missing them','soft for','flustered','swooning','in love','devoted',
        'cherish','enamored','affectionate','yearning','longing','pine',
        'pining','they replied','they texted','holding hands','first kiss',
        'date night','they smiled at me','thinking about them','dreamboat',
        'my person','soulmate','wife material','husband material','couple goals',
      ])) return 'love';

      if (has([
        'anxious','anxiety','stressed','stress','worry','worried','worrying',
        'nervous','spiral','spiraling','overthink','overthinking','panic',
        'panicking','brainrot','brain rot','doomscroll','doom scroll',
        'freaking out','on edge','scared','uneasy','jittery','restless',
        'unsettled','apprehensive','tense','wound up','racing thoughts',
        'what if','worst case','catastrophiz','impending doom','dreading',
        'hyperventilat','trembling','shaking','cortisol','anxiety jumpscare',
        'scared of','terrified','afraid','dread','foreboding','pit in stomach',
        'knot in chest','chest tight','can\'t breathe','shallow breath',
        'heart racing','doom and gloom','something bad will happen',
        'waiting for bad news','nervous wreck','basket case',
      ])) return 'anxious';

      if (has([
        'hyped','hype','pumped','stoked','amped','gassed','lets go',
        'let\'s go','sheesh','can\'t wait','yesss','insane','wild',
        'crazy good','electric','on fire','unstoppable','ready to go',
        'game on','turbo','activated','energized','revved up','charged',
        'adrenaline','SO EXCITED','so stoked','going crazy','losing my mind happy',
        'jumping up and down','can\'t contain it','beyond excited',
        'about to explode','through the roof','to the moon','going insane',
        'best thing ever','absolutely losing it','freaking out happy',
        'holy cow','no freaking way','oh my god yes',
      ])) return 'hyped';

      if (has([
        'bored','boring','boredom','meh','blah','zoned out','nothing to do',
        'blank','whatever','don\'t care','indifferent','numb','going through motions',
        'autopilot','zombie mode','npc mode','dead inside','just existing',
        'nothing matters','pointless','tedious','dull','flat','lifeless',
        'uninspired','checked out','disconnected','nothing going on',
        'staring at the ceiling','twiddling thumbs','scrolling for hours',
        'can\'t find anything to do','nothing is interesting','meh day',
        'not feeling anything','completely blank','hollow','empty',
      ])) return 'bored';

      if (has([
        'nostalgic','nostalgia','memories','throwback','reminiscing',
        'remember when','brings back','used to','back then','old times',
        'miss those days','simpler times','core memory','childhood',
        'takes me back','TBT','tb','feels like forever ago','vintage feel',
        'retro mood','remember this','where did time go','flash back',
        'flashback','back in the day','old school','old song','old photo',
        'looked at old pics','found an old','younger','when i was a kid',
        'how did we get here','feels like yesterday','years ago',
        'grew up so fast','time flies',
      ])) return 'nostalgic';

      if (has([
        'tired','exhausted','drained','burnt out','burnout','burn out',
        'running on empty','dead tired','fatigued','sleepy','no energy',
        'cooked','need sleep','crashed','running low','depleted','worn out',
        'beat','wiped','zapped','bare minimum era','bed rotting','bed rot',
        'can\'t function','zombie','half asleep','barely awake','need coffee',
        'survival mode','running on fumes','mentally drained','physically drained',
        'so tired','beyond tired','hadn\'t slept','no sleep','sleep deprived',
        'dead on my feet','can\'t keep eyes open','want to sleep forever',
        'just want to rest','can\'t do anything','too tired to care',
        'low battery','recharg','overworked',
      ])) return 'tired';

      if (has([
        'grateful','thankful','appreciate','gratitude','so thankful','so lucky',
        'fortunate','blessed fr','full heart','counting my blessings','owe so much',
        'means everything','beyond grateful','can\'t thank enough','feel supported',
        'surrounded by love','abundance','feel so seen','feel so loved',
        'people showed up','they came through','had my back','community',
        'generosity','kindness received','moved to tears happy','touched',
        'so appreciated','what a gift','undeserving','truly grateful',
      ])) return 'grateful';

      if (has([
        'lonely','alone','isolated','no one','nobody','all by myself',
        'abandoned','left out','excluded','invisible','forgotten','ghosted',
        'nobody checks on me','no one cares','empty room','by myself',
        'solo dolo','friendless','disconnected from everyone','feeling invisible',
        'hollow inside','talking to walls','no replies','sat alone','eating alone',
        'went alone','third wheel','left behind','nobody invited me',
        'they all left','feels empty without','house is quiet','silence',
        'loneliness','can\'t connect','no one gets it',
      ])) return 'lonely';

      return t.length > 0 ? null : 'default';
    }

    /* ─────────────────────────────────────────────
       FLOATING PARTICLES
    ───────────────────────────────────────────── */
    function Particles({ colors, moodKey }) {
      const particles = useRef(
        Array.from({ length: 12 }, (_, i) => ({
          id: i,
          x:        4 + Math.random() * 92,
          y:        4 + Math.random() * 92,
          size:     7 + Math.random() * 18,
          delay:    Math.random() * 5,
          duration: 3.5 + Math.random() * 5,
          shape:    Math.random() > 0.5 ? '50%' : `${20 + Math.random() * 30}%`,
        }))
      );

      return (
        <div className="fixed inset-0 pointer-events-none overflow-hidden z-0">
          {particles.current.map((p, i) => (
            <div
              key={p.id}
              className="absolute opacity-35"
              style={{
                left:            `${p.x}%`,
                top:             `${p.y}%`,
                width:           p.size,
                height:          p.size,
                backgroundColor: colors[i % colors.length],
                borderRadius:    p.shape,
                animation:       `float ${p.duration}s ease-in-out ${p.delay}s infinite`,
              }}
            />
          ))}
        </div>
      );
    }

    /* ─────────────────────────────────────────────
       VIBEBOLT SVG MASCOT — soft, borderless kawaii
       Gradient body · no outlines · muted features
    ───────────────────────────────────────────── */
    function VibeBol({ mood }) {
      const m  = MOODS[mood] || MOODS.default;
      const INK = '#3b4370';   /* soft dark navy — replaces harsh black */
      const gid = `g${mood}`;  /* unique gradient id per mood */

      /* ── Eyes ── */
      const Eyes = () => {
        if (m.eyeType === 'half') return (
          <g>
            <path d="M 52 80 Q 63 72 74 80" stroke={INK} strokeWidth="3.5" fill="none" strokeLinecap="round" />
            <path d="M 86 80 Q 97 72 108 80" stroke={INK} strokeWidth="3.5" fill="none" strokeLinecap="round" />
          </g>
        );
        if (m.eyeType === 'heart') return (
          <g>
            <text x="49" y="90" fontSize="24" fill={m.cheekColor}>&#x2764;</text>
            <text x="83" y="90" fontSize="24" fill={m.cheekColor}>&#x2764;</text>
          </g>
        );
        if (m.eyeType === 'wide') return (
          <g>
            <circle cx="63" cy="80" r="11" fill={INK}>
              <animate attributeName="r" values="11;8;11" dur="0.6s" repeatCount="indefinite" />
            </circle>
            <circle cx="58" cy="75" r="4"  fill="white" />
            <circle cx="68" cy="76" r="2"  fill="white" />
            <circle cx="97" cy="80" r="11" fill={INK}>
              <animate attributeName="r" values="11;8;11" dur="0.6s" repeatCount="indefinite" />
            </circle>
            <circle cx="92" cy="75" r="4"  fill="white" />
            <circle cx="102" cy="76" r="2" fill="white" />
          </g>
        );
        if (m.eyeType === 'curious') return (
          <g>
            <ellipse cx="63" cy="80" rx="9.5" ry="11" fill={INK}>
              <animate attributeName="ry" values="11;1;11" dur="5s" repeatCount="indefinite" begin="2s" />
            </ellipse>
            <circle cx="58" cy="75" r="4"  fill="white" />
            <circle cx="68" cy="76" r="2"  fill="white" />
            <ellipse cx="97" cy="80" rx="9.5" ry="11" fill={INK}>
              <animate attributeName="ry" values="11;1;11" dur="5s" repeatCount="indefinite" begin="2s" />
            </ellipse>
            <circle cx="92" cy="75" r="4"  fill="white" />
            <circle cx="102" cy="76" r="2" fill="white" />
            <path d="M 52 67 Q 63 60 74 65" stroke={INK} strokeWidth="2" fill="none" strokeLinecap="round" />
          </g>
        );
        return (
          <g>
            <ellipse cx="63" cy="80" rx="9.5" ry="11" fill={INK}>
              <animate attributeName="ry" values="11;1;11" dur="4.5s" repeatCount="indefinite" begin="2s" />
            </ellipse>
            <circle cx="58" cy="75" r="4"  fill="white" />
            <circle cx="68" cy="76" r="2"  fill="white" />
            <ellipse cx="97" cy="80" rx="9.5" ry="11" fill={INK}>
              <animate attributeName="ry" values="11;1;11" dur="4.5s" repeatCount="indefinite" begin="2s" />
            </ellipse>
            <circle cx="92" cy="75" r="4"  fill="white" />
            <circle cx="102" cy="76" r="2" fill="white" />
          </g>
        );
      };

      /* ── Mouths ── */
      const Mouth = () => {
        switch (m.mouthType) {
          case 'happy': return (
            <g>
              <path d="M 55 109 Q 80 135 105 109" stroke={INK} strokeWidth="3.5" fill="none" strokeLinecap="round" />
              <ellipse cx="80" cy="120" rx="12" ry="8" fill="#fca5a5" opacity="0.8" />
            </g>
          );
          case 'sad': return (
            <g>
              <path d="M 57 122 Q 80 101 103 122" stroke={INK} strokeWidth="3.5" fill="none" strokeLinecap="round" />
              <ellipse cx="51" cy="88" rx="4" ry="6.5" fill="#93c5fd" opacity="0.9">
                <animate attributeName="cy" values="88;130;88" dur="2.3s" repeatCount="indefinite" />
                <animate attributeName="opacity" values="0.9;0;0.9" dur="2.3s" repeatCount="indefinite" />
              </ellipse>
            </g>
          );
          case 'angry': return (
            <g>
              <path d="M 51 67 Q 61 73 72 70" stroke={INK} strokeWidth="4" fill="none" strokeLinecap="round" />
              <path d="M 109 67 Q 99 73 88 70" stroke={INK} strokeWidth="4" fill="none" strokeLinecap="round" />
              <rect x="61" y="110" width="38" height="13" rx="4" fill={INK} opacity="0.85" />
              <rect x="63" y="111" width="7" height="11" rx="2" fill="white" opacity="0.9" />
              <rect x="72" y="111" width="7" height="11" rx="2" fill="white" opacity="0.9" />
              <rect x="81" y="111" width="7" height="11" rx="2" fill="white" opacity="0.9" />
              <rect x="90" y="111" width="7" height="11" rx="2" fill="white" opacity="0.9" />
            </g>
          );
          case 'anxious': return (
            <g>
              <path d="M 61 114 Q 67 106 74 114 Q 81 122 88 114 Q 95 106 101 114"
                stroke={INK} strokeWidth="3" fill="none" strokeLinecap="round" />
              <ellipse cx="116" cy="76" rx="4" ry="6.5" fill="#c4b5fd" opacity="0.9">
                <animate attributeName="cy" values="76;110;76" dur="1.7s" repeatCount="indefinite" />
                <animate attributeName="opacity" values="0.9;0;0.9" dur="1.7s" repeatCount="indefinite" />
              </ellipse>
            </g>
          );
          case 'tired': return (
            <g>
              <path d="M 64 115 Q 80 124 96 115" stroke={INK} strokeWidth="3" fill="none" strokeLinecap="round" />
              <text x="108" y="72" fontSize="14" fill="#a78bfa" fontWeight="bold" opacity="0.85">
                Z
                <animate attributeName="y"       values="72;52;72"     dur="2.2s" repeatCount="indefinite" />
                <animate attributeName="opacity" values="0.85;0.1;0.85" dur="2.2s" repeatCount="indefinite" />
              </text>
              <text x="119" y="61" fontSize="10" fill="#c4b5fd" opacity="0.65">
                z
                <animate attributeName="y"       values="61;45;61"      dur="2.2s" begin="0.4s" repeatCount="indefinite" />
                <animate attributeName="opacity" values="0.65;0.1;0.65" dur="2.2s" begin="0.4s" repeatCount="indefinite" />
              </text>
            </g>
          );
          case 'love': return (
            <g>
              <path d="M 55 109 Q 80 135 105 109" stroke={INK} strokeWidth="3.5" fill="none" strokeLinecap="round" />
              <text x="113" y="68" fontSize="18" fill={m.cheekColor} opacity="0.9">
                &#x2764;
                <animate attributeName="y"       values="68;44;68"    dur="1.9s" repeatCount="indefinite" />
                <animate attributeName="opacity" values="0.9;0.1;0.9" dur="1.9s" repeatCount="indefinite" />
              </text>
              <text x="34" y="59" fontSize="13" fill={m.cheekColor} opacity="0.65">
                &#x2764;
                <animate attributeName="y"       values="59;37;59"     dur="2.5s" repeatCount="indefinite" />
                <animate attributeName="opacity" values="0.65;0.1;0.65" dur="2.5s" repeatCount="indefinite" />
              </text>
            </g>
          );
          case 'chill': return (
            <path d="M 63 111 Q 80 120 97 111" stroke={INK} strokeWidth="3" fill="none" strokeLinecap="round" />
          );
          case 'asking': return (
            <g>
              <ellipse cx="80" cy="114" rx="8" ry="6.5" fill={INK} opacity="0.85" />
              <ellipse cx="80" cy="114" rx="5.5" ry="4.5" fill="white" opacity="0.55" />
              <text x="110" y="58" fontSize="22" fill={m.accent} fontWeight="bold" opacity="0.85">
                ?
                <animate attributeName="y"       values="58;46;58"     dur="2s" repeatCount="indefinite" />
                <animate attributeName="opacity" values="0.85;0.2;0.85" dur="2s" repeatCount="indefinite" />
              </text>
            </g>
          );
          default: return (
            <line x1="68" y1="111" x2="92" y2="111" stroke={INK} strokeWidth="3" strokeLinecap="round" />
          );
        }
      };

      return (
        <svg viewBox="0 0 160 162" className="w-52 h-52 md:w-72 md:h-72 float-anim mascot-pop">
          <defs>
            {/* Radial gradient: bright white centre → soft mood tint at edge */}
            <radialGradient id={gid} cx="38%" cy="32%" r="68%" gradientUnits="objectBoundingBox">
              <stop offset="0%"   stopColor="#ffffff" stopOpacity="1" />
              <stop offset="100%" stopColor={m.bodyGlow} stopOpacity="0.65" />
            </radialGradient>
          </defs>

          {/* Soft pulsing glow */}
          <ellipse cx="80" cy="92" rx="60" ry="56" fill={m.bodyGlow} opacity="0.32" className="pulse-ring" />

          {/* Chubby oval body — earless, gradient, no border */}
          <ellipse cx="80" cy="92" rx="55" ry="51" fill={`url(#${gid})`} />

          {/* Soft specular shine */}
          <ellipse cx="62" cy="67" rx="20" ry="13" fill="white" opacity="0.55" transform="rotate(-28,62,67)" />

          {/* Rosy cheeks */}
          <ellipse cx="38"  cy="104" rx="17" ry="12" fill={m.cheekColor} opacity="0.38" />
          <ellipse cx="122" cy="104" rx="17" ry="12" fill={m.cheekColor} opacity="0.38" />

          {/* Tiny button nose */}
          <ellipse cx="80" cy="98" rx="5" ry="3.5" fill={INK} opacity="0.30" />

          <Eyes />
          <Mouth />

          {/* Soft stubby feet — gradient, no border */}
          <ellipse cx="64" cy="143" rx="14" ry="7.5" fill={`url(#${gid})`} />
          <ellipse cx="96" cy="143" rx="14" ry="7.5" fill={`url(#${gid})`} />

        </svg>
      );
    }

    /* ─────────────────────────────────────────────
       MOOD PILLS — exactly 5
    ───────────────────────────────────────────── */
    const PILL_META = {
      happy: { icon: '☀️',  label: 'Happy'  },
      sad:   { icon: '🌧️', label: 'Sad'    },
      angry: { icon: '🔥',  label: 'Angry'  },
      chill: { icon: '🌿',  label: 'Chill'  },
      love:  { icon: '❤️',  label: 'Love'   },
    };

    function MoodPills({ onSelect, currentMood }) {
      return (
        <div className="flex flex-wrap justify-center gap-2 mt-4">
          {PILL_MOODS.map(mood => {
            const active = currentMood === mood;
            return (
              <button
                key={mood}
                onClick={() => onSelect(mood)}
                className={`px-4 py-2 rounded-full text-sm font-bold transition-all duration-200 border-2
                  ${active
                    ? 'bg-white/55 border-white/90 scale-110 shadow-2xl text-gray-900'
                    : 'bg-white/10 border-white/25 hover:bg-white/30 hover:scale-105 text-white hover:border-white/55'
                  }`}
                style={{ backdropFilter: 'blur(8px)' }}
              >
                <span className="mr-1">{PILL_META[mood].icon}</span>
                {PILL_META[mood].label}
              </button>
            );
          })}
        </div>
      );
    }

    /* ─────────────────────────────────────────────
       SONG TOAST
       Appears ~1.8s after a new mood is detected.
       Suggests a matching song and asks to play.
    ───────────────────────────────────────────── */
    function SongToast({ mood, onYes, onDismiss }) {
      const song = VIBE_SONGS[mood];
      const m    = MOODS[mood] || MOODS.default;
      if (!song) return null;
      return (
        <div className="fixed bottom-24 left-1/2 z-50 w-80 max-w-[calc(100vw-2rem)] slide-up"
             style={{ transform: 'translateX(-50%)' }}>
          <div className="rounded-2xl border border-white/30 shadow-2xl px-5 py-4"
               style={{ background: 'rgba(255,255,255,0.20)', backdropFilter: 'blur(20px)' }}>

            {/* Header */}
            <div className="flex items-start justify-between mb-2">
              <p className="text-white font-bold text-sm leading-snug"
                 style={{ fontFamily: 'Fredoka, sans-serif', textShadow: '0 1px 6px rgba(0,0,0,0.3)' }}>
                🎵 Want a song for this vibe?
              </p>
              <button onClick={onDismiss}
                      className="text-white/40 hover:text-white/80 text-lg leading-none ml-3 transition-colors">
                ×
              </button>
            </div>

            {/* Song info */}
            <div className="mb-3 pl-1">
              <p className="text-white font-semibold text-sm"
                 style={{ textShadow: '0 1px 4px rgba(0,0,0,0.25)' }}>
                {song.title}
              </p>
              <p className="text-white/60 text-xs">{song.artist}</p>
            </div>

            {/* Buttons */}
            <div className="flex gap-2">
              <button
                onClick={onYes}
                className="flex-1 py-2 rounded-xl font-bold text-sm text-white transition-all
                           hover:scale-105 active:scale-95"
                style={{ background: 'rgba(255,255,255,0.28)', backdropFilter: 'blur(8px)',
                         boxShadow: `0 0 16px ${m.accent}55` }}
              >
                ▶ Yes, play it!
              </button>
              <button
                onClick={onDismiss}
                className="px-4 py-2 rounded-xl text-sm text-white/60 hover:text-white/90
                           transition-all hover:bg-white/10"
              >
                Skip
              </button>
            </div>
          </div>
        </div>
      );
    }

    /* ─────────────────────────────────────────────
       AUDIO PLAYER
       Shows after "Yes" is clicked on the toast.
       Uses HTML5 <audio> — works with any direct
       MP3/OGG/WAV URL pasted into VIBE_SONGS above.
    ───────────────────────────────────────────── */
    function AudioPlayer({ mood, onClose }) {
      const [playing,  setPlaying]  = useState(false);
      const [progress, setProgress] = useState(0);
      const [elapsed,  setElapsed]  = useState(0);
      const [total,    setTotal]    = useState(0);
      const audioRef       = useRef(null);
      const intervalRef    = useRef(null);

      const song   = VIBE_SONGS[mood] || VIBE_SONGS.default;
      const m      = MOODS[mood]      || MOODS.default;
      const hasUrl = !!song.url;

      /* Format seconds → m:ss */
      const fmt = s => `${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`;

      /* Sync audio metadata */
      const handleMeta = () => {
        if (audioRef.current) setTotal(audioRef.current.duration || 0);
      };

      const clearTick = () => clearInterval(intervalRef.current);

      const startTick = () => {
        clearTick();
        intervalRef.current = setInterval(() => {
          if (!audioRef.current) return;
          const cur = audioRef.current.currentTime;
          const dur = audioRef.current.duration || 1;
          setElapsed(cur);
          setProgress((cur / dur) * 100);
          if (cur >= dur) { clearTick(); setPlaying(false); setProgress(100); }
        }, 250);
      };

      const togglePlay = () => {
        if (!hasUrl || !audioRef.current) return;
        if (playing) {
          audioRef.current.pause();
          clearTick();
          setPlaying(false);
        } else {
          audioRef.current.play().catch(() => {});
          startTick();
          setPlaying(true);
        }
      };

      /* Seek by clicking progress bar */
      const handleSeek = (e) => {
        if (!hasUrl || !audioRef.current) return;
        const rect = e.currentTarget.getBoundingClientRect();
        const pct  = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
        audioRef.current.currentTime = pct * (audioRef.current.duration || 0);
        setProgress(pct * 100);
      };

      /* Reset when mood changes, cleanup on unmount */
      useEffect(() => {
        clearTick();
        if (audioRef.current) { audioRef.current.pause(); audioRef.current.currentTime = 0; }
        setPlaying(false);
        setProgress(0);
        setElapsed(0);
      }, [mood]);

      useEffect(() => () => { clearTick(); audioRef.current?.pause(); }, []);

      return (
        <div className="fixed bottom-6 left-1/2 z-40 w-80 max-w-[calc(100vw-2rem)] fade-in-scale"
             style={{ transform: 'translateX(-50%)' }}>
          {hasUrl && (
            <audio ref={audioRef} src={song.url} preload="metadata" onLoadedMetadata={handleMeta} />
          )}
          <div className="rounded-2xl border border-white/30 shadow-2xl px-5 py-4"
               style={{ background: 'rgba(255,255,255,0.22)', backdropFilter: 'blur(22px)' }}>

            {/* Header row */}
            <div className="flex items-start justify-between mb-3">
              <div className="flex items-center gap-2">
                <span className="text-lg">🎵</span>
                <div>
                  <p className="text-white font-bold text-sm leading-tight"
                     style={{ fontFamily: 'Fredoka, sans-serif', textShadow: '0 1px 6px rgba(0,0,0,0.3)' }}>
                    {song.title}
                  </p>
                  <p className="text-white/55 text-xs">{song.artist}</p>
                </div>
              </div>
              <button onClick={onClose}
                      className="text-white/40 hover:text-white/90 text-xl leading-none ml-2 transition-colors">
                ×
              </button>
            </div>

            {/* Progress bar — clickable */}
            <div
              className="relative h-2 bg-white/20 rounded-full mb-2 overflow-hidden cursor-pointer group"
              onClick={handleSeek}
            >
              <div
                className="h-full rounded-full transition-all duration-200"
                style={{ width: `${progress}%`, background: m.accent,
                         boxShadow: `0 0 8px ${m.accent}99` }}
              />
              {/* Thumb dot */}
              <div
                className="absolute top-1/2 -translate-y-1/2 w-3 h-3 rounded-full bg-white shadow-md
                           opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none"
                style={{ left: `calc(${progress}% - 6px)` }}
              />
            </div>

            {/* Time display */}
            <div className="flex justify-between text-white/40 text-xs mb-3">
              <span>{fmt(elapsed)}</span>
              <span>{total > 0 ? fmt(total) : '--:--'}</span>
            </div>

            {/* Controls row */}
            <div className="flex items-center gap-3">
              {/* Play / Pause */}
              <button
                onClick={togglePlay}
                disabled={!hasUrl}
                className={`w-11 h-11 rounded-full flex items-center justify-center text-lg font-bold
                            transition-all
                            ${hasUrl
                              ? 'text-white hover:scale-110 active:scale-95'
                              : 'text-white/25 cursor-not-allowed'}`}
                style={hasUrl ? { background: m.accent,
                                  boxShadow: `0 0 20px ${m.accent}88` } : { background: 'rgba(255,255,255,0.12)' }}
              >
                {playing ? '⏸' : '▶'}
              </button>

              {/* Status text */}
              <div className="flex-1 min-w-0">
                {hasUrl ? (
                  <p className="text-white/60 text-xs truncate">
                    {playing ? 'Now playing…' : 'Tap ▶ to play'}
                  </p>
                ) : (
                  <p className="text-white/35 text-xs leading-snug italic">
                    Paste a URL in VIBE_SONGS['{mood}'] to activate ✦
                  </p>
                )}
              </div>
            </div>

          </div>
        </div>
      );
    }

    /* ─────────────────────────────────────────────
       MAIN APP
    ───────────────────────────────────────────── */
    function App() {
      const [input,        setInput]        = useState('');
      const [activeMood,   setActiveMood]   = useState('default');
      const [showHint,     setShowHint]     = useState(true);
      const [toastVisible, setToastVisible] = useState(false);
      const [playerVisible,setPlayerVisible]= useState(false);

      const inputRef        = useRef(null);
      const toastTimerRef   = useRef(null);
      const lastToastMood   = useRef('default'); // track which mood last triggered the toast

      /* ── Mood detection from input ── */
      useEffect(() => {
        const detected = getMood(input);
        if (detected) {
          setActiveMood(detected);
          setShowHint(false);
        } else if (input.length > 0) {
          setActiveMood('default');
          setShowHint(false);
        } else {
          setActiveMood('default');
          setShowHint(true);
        }
      }, [input]);

      /* ── Toast scheduling: fires 1.8s after a NEW non-default mood ── */
      useEffect(() => {
        clearTimeout(toastTimerRef.current);

        if (activeMood !== 'default' && activeMood !== lastToastMood.current) {
          // New mood detected — dismiss old toast, schedule fresh one
          setToastVisible(false);
          toastTimerRef.current = setTimeout(() => {
            lastToastMood.current = activeMood;
            setToastVisible(true);
          }, 1800);
        } else if (activeMood === 'default') {
          lastToastMood.current = 'default';
          setToastVisible(false);
          // Keep player open — let user close it manually
        }

        return () => clearTimeout(toastTimerRef.current);
      }, [activeMood]);

      const handlePillClick = useCallback((mood) => {
        setInput(mood);
        inputRef.current?.focus();
      }, []);

      const handleToastYes = () => {
        setToastVisible(false);
        setPlayerVisible(true);
      };

      const handleToastDismiss = () => setToastVisible(false);
      const handlePlayerClose  = () => setPlayerVisible(false);

      const m = MOODS[activeMood] || MOODS.default;

      return (
        <div
          className={`min-h-screen bg-gradient-to-br ${m.bg} vibe-transition
            flex flex-col items-center justify-center relative overflow-hidden`}
        >
          <Particles colors={m.particleColors} moodKey={activeMood} key={activeMood} />

          <div className="relative z-10 flex flex-col items-center px-4 max-w-lg w-full">

            {/* Title */}
            <h1
              className="text-5xl md:text-6xl font-bold text-white mb-1 tracking-tight"
              style={{
                fontFamily:  'Fredoka, sans-serif',
                textShadow:  '0 2px 24px rgba(0,0,0,0.45), 0 0 60px rgba(0,0,0,0.2)',
              }}
            >
              VibeCheck
            </h1>
            <p className="text-white/75 text-sm md:text-base mb-8 font-medium tracking-wide"
               style={{ textShadow: '0 1px 8px rgba(0,0,0,0.3)' }}>
              Drop a mood. Watch the vibe shift.
            </p>

            {/* Mascot */}
            <div className="bounce-in mb-4" key={activeMood}>
              <VibeBol mood={activeMood} />
            </div>

            {/* Mood label */}
            <p
              className="font-bold text-xl mb-6 h-8 text-white"
              style={{
                fontFamily: 'Fredoka, sans-serif',
                textShadow: '0 1px 12px rgba(0,0,0,0.45)',
              }}
            >
              {m.label}
            </p>

            {/* Input */}
            <div className="w-full relative">
              <input
                ref={inputRef}
                type="text"
                value={input}
                onChange={(e) => setInput(e.target.value)}
                placeholder="Type how you feel..."
                className="w-full px-6 py-4 rounded-2xl border-2 border-white/55 outline-none input-glow
                  vibe-transition text-white placeholder-white/40 text-lg font-semibold
                  focus:border-white/80"
                style={{
                  background:     'rgba(255,255,255,0.18)',
                  backdropFilter: 'blur(14px)',
                  textShadow:     '0 1px 6px rgba(0,0,0,0.2)',
                }}
                autoFocus
              />
              {input && (
                <button
                  onClick={() => { setInput(''); inputRef.current?.focus(); }}
                  className="absolute right-4 top-1/2 -translate-y-1/2 w-8 h-8 rounded-full
                    bg-white/20 hover:bg-white/45 flex items-center justify-center
                    text-white/80 hover:text-white transition-all text-xl font-bold"
                >
                  &times;
                </button>
              )}
            </div>

            {/* 5 mood pills */}
            <MoodPills onSelect={handlePillClick} currentMood={activeMood} />

            {/* Hint */}
            {showHint && (
              <p className="text-white/45 text-xs mt-5 animate-pulse text-center">
                Try &quot;anxious&quot;, &quot;burnt out&quot;, &quot;down bad&quot;, &quot;bed rotting&quot;... ✦
              </p>
            )}
          </div>

          {/* Song Toast */}
          {toastVisible && (
            <SongToast
              mood={activeMood}
              onYes={handleToastYes}
              onDismiss={handleToastDismiss}
            />
          )}

          {/* Audio Player */}
          {playerVisible && (
            <AudioPlayer
              mood={activeMood}
              onClose={handlePlayerClose}
            />
          )}

          {/* Footer — pushed up when player is visible */}
          <div
            className={`absolute text-white/30 text-xs z-10 font-medium transition-all duration-300
                        ${playerVisible ? 'bottom-[calc(theme(spacing.6)+7rem)]' : 'bottom-4'}`}
            style={{ textShadow: '0 1px 4px rgba(0,0,0,0.3)' }}
          >
            Built with vibes &amp; React
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
